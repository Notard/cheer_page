<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>천천히 도는 샌드위치</title>
  <style>
    :root {
      color-scheme: light;
      --sky: #d9edf2;
      --mint: #b9d9c4;
      --cream: #fff7e8;
      --toast: #e9bc73;
      --crust: #b67437;
      --leaf: #62a86f;
      --tomato: #dd6a5d;
      --cheese: #f2d36b;
      --shadow: rgba(54, 67, 73, 0.18);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
    }

    body {
      display: grid;
      place-items: center;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 45%, rgba(255, 255, 255, 0.72), transparent 28rem),
        linear-gradient(145deg, var(--sky), var(--cream) 56%, var(--mint));
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .quiet-room {
      position: relative;
      display: grid;
      place-items: center;
      width: min(78vmin, 560px);
      aspect-ratio: 1;
    }

    .quiet-room::before {
      position: absolute;
      width: 48%;
      height: 9%;
      content: "";
      background: var(--shadow);
      border-radius: 50%;
      filter: blur(18px);
      transform: translateY(190%);
      animation: shadow-breathe 7s ease-in-out infinite;
    }

    .sandwich {
      width: 64%;
      height: auto;
      filter: drop-shadow(0 22px 22px rgba(67, 59, 45, 0.16));
      transform-origin: 50% 52%;
      animation: sleepy-spin 18s linear infinite;
    }

    .crumb {
      position: absolute;
      width: 9px;
      height: 9px;
      background: rgba(182, 116, 55, 0.38);
      border-radius: 50%;
      animation: drift 10s ease-in-out infinite;
    }

    .crumb:nth-child(2) {
      top: 24%;
      left: 23%;
      animation-delay: -2s;
    }

    .crumb:nth-child(3) {
      right: 20%;
      bottom: 31%;
      width: 7px;
      height: 7px;
      background: rgba(98, 168, 111, 0.28);
      animation-delay: -5s;
    }

    .crumb:nth-child(4) {
      top: 32%;
      right: 25%;
      width: 6px;
      height: 6px;
      background: rgba(221, 106, 93, 0.26);
      animation-delay: -7s;
    }

    @keyframes sleepy-spin {
      from {
        transform: rotate(0deg);
      }

      to {
        transform: rotate(360deg);
      }
    }

    @keyframes shadow-breathe {
      0%,
      100% {
        opacity: 0.56;
        transform: translateY(190%) scale(0.92);
      }

      50% {
        opacity: 0.36;
        transform: translateY(190%) scale(1.08);
      }
    }

    @keyframes drift {
      0%,
      100% {
        transform: translate3d(0, 0, 0);
      }

      50% {
        transform: translate3d(12px, -10px, 0);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .sandwich,
      .quiet-room::before,
      .crumb {
        animation-duration: 48s;
      }
    }
  </style>
</head>
<body>
  <main class="quiet-room" aria-label="천천히 빙글빙글 도는 샌드위치">
    <svg class="sandwich" viewBox="0 0 420 420" role="img" aria-label="샌드위치 그림">
      <defs>
        <linearGradient id="breadTop" x1="82" x2="338" y1="90" y2="326" gradientUnits="userSpaceOnUse">
          <stop offset="0" stop-color="#fff0bb"/>
          <stop offset="0.58" stop-color="#e8b568"/>
          <stop offset="1" stop-color="#cc8845"/>
        </linearGradient>
        <linearGradient id="breadSide" x1="88" x2="310" y1="132" y2="324" gradientUnits="userSpaceOnUse">
          <stop offset="0" stop-color="#f7d18b"/>
          <stop offset="1" stop-color="#b77235"/>
        </linearGradient>
      </defs>

      <g transform="rotate(-8 210 210)">
        <path d="M88 137 C99 74 181 45 255 66 C320 84 357 133 348 189 C342 229 314 257 270 273 L130 226 C97 207 81 176 88 137Z"
              fill="url(#breadSide)"/>
        <path d="M106 127 C116 78 181 58 247 74 C305 88 338 129 329 176 C322 214 289 242 237 255 L101 206 C79 180 78 151 106 127Z"
              fill="url(#breadTop)"/>
        <path d="M115 130 C135 90 190 78 244 91 C287 101 314 128 315 161"

        <path d="M92 206 L237 255 L316 214 C328 224 330 241 316 251 L235 302 L87 248 C73 239 74 215 92 206Z"
              fill="#f2d36b"/>
        <path d="M90 219 C126 211 145 248 178 242 C207 236 219 199 252 207 C276 213 288 239 319 228 L319 258 L235 315 L81 259 Z"
              fill="#62a86f"/>
        <path d="M95 238 L236 287 L322 241 C335 251 335 270 319 280 L238 331 L84 277 C69 268 73 246 95 238Z"
              fill="#f7f0d3"/>
        <path d="M111 249 C129 236 157 235 176 249 C194 263 189 286 168 293 C145 302 113 288 105 269 C102 261 104 254 111 249Z"
              fill="#dd6a5d"/>
        <path d="M229 287 C250 274 281 273 301 288 C320 302 313 326 289 333 C264 341 229 326 222 306 C219 298 222 291 229 287Z"
              fill="#dd6a5d"/>
        <path d="M85 276 L238 331 L324 280 C339 293 338 315 319 328 L240 374 L75 313 C57 302 63 282 85 276Z"
              fill="url(#breadSide)"/>
        <path d="M93 269 L240 322 L316 278 C330 286 328 305 312 314 L241 354 L82 297 C69 290 74 274 93 269Z"
              fill="url(#breadTop)"/>

        <g fill="#9d632f" opacity="0.72">
          <circle cx="145" cy="126" r="6"/>
          <circle cx="203" cy="103" r="5"/>
          <circle cx="261" cy="137" r="6"/>
          <circle cx="174" cy="169" r="4"/>
          <circle cx="239" cy="197" r="5"/>
          <circle cx="132" cy="292" r="5"/>
          <circle cx="202" cy="318" r="4"/>
          <circle cx="268" cy="313" r="5"/>
        </g>

        <path d="M89 297 L239 353 L313 312" fill="none" stroke="#a5622d" stroke-width="7" stroke-linecap="round" opacity="0.35"/>
      </g>
    </svg>
    <span class="crumb" aria-hidden="true"></span>
    <span class="crumb" aria-hidden="true"></span>
    <span class="crumb" aria-hidden="true"></span>
  </main>
</body>
</html>
