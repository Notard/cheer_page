<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>딴짓 포트폴리오</title>
    <meta
      name="description"
      content="작게 만들었던 웹 딴짓들을 한 페이지에 모아둔 포트폴리오입니다."
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div>
        <p class="eyebrow">web side quests</p>
        <h1>딴짓 포트폴리오</h1>
      </div>
      <p class="intro">
        작게 만들었던 웹 실험들을 한곳에 모았습니다. 카드를 열면 각각의 페이지로 바로 이동합니다.
      </p>
    </header>

    <main>
      <section class="project-grid" id="projectGrid" aria-label="딴짓 목록"></section>
    </main>

    <footer class="site-footer">
      <span id="projectCount">0개</span>
      <span>새 딴짓은 <code>projects.js</code>에 한 줄만 추가하면 됩니다.</span>
    </footer>

    <script src="./projects.js"></script>
    <script src="./script.js"></script>
  </body>
</html>
